version: '3'

includes:
  common:
    taskfile: mono-dev/task/common.yaml
    optional: true
    flatten: true

  cli:  { taskfile: packages/cli,  dir: packages/cli,  internal: true }
  lib:  { taskfile: packages/lib,  dir: packages/lib,  internal: true }
  docs: { taskfile: packages/docs, dir: packages/docs, internal: true }

tasks:
  install:
    - rm -rf packages/mono-dev
    - rm -rf mono-dev
    - git clone https://github.com/Pistonight/mono-dev --depth 1
    - task: install-ci

  install-ci:
    - task: docs:install

  install-cargo-extra-tools:
    aliases: [icets]
    cmds:
      - task: cargo-binstall
        vars:
          PACKAGES: lisensor mdbook@0.4 mdbook-admonish shwoop

  check:
    - task: check-non-dkp
    - task: check-dkp
  check-non-dkp:
    - task: cli:check
    - lisensor
  check-dkp:
    - task: lib:configure
    - task: lib:check-c

  build:
    - task: build-non-dkp
    - task: build-dkp
  build-non-dkp:
    - task: cli:build
    - task: docs:build
  build-dkp:
    - task: lib:configure
    - task: lib:build

  license:
    desc: check or fix license notices (-- -f to fix)
    cmds:
      - lisensor {{.CLI_ARGS}}

