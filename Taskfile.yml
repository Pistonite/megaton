version: '3'

includes:
  common:
    taskfile: mono-dev/task/common.yaml
    optional: true
    flatten: true

  cli:             { taskfile: packages/cli,              dir: packages/cli,             internal: true }
  cli-build:       { taskfile: packages/cli-build,        dir: packages/cli-build,       internal: true }
  docker-build:    { taskfile: packages/docker-build,     dir: packages/docker-build,    internal: true }
  docs:            { taskfile: packages/docs,             dir: packages/docs,            internal: true }
  lib:             { taskfile: packages/lib,              dir: packages/lib,             internal: true }
  toolchain-build: { taskfile: packages/toolchain-build,  dir: packages/toolchain-build,  internal: true }

tasks:
  install:
    - rm -rf packages/mono-dev
    - rm -rf mono-dev
    - git clone https://github.com/Pistonight/mono-dev --depth 1
    - task: install-ci

  install-ci:
    - task: docs:install

  install-cargo-extra-tools:
    aliases: [icets]
    cmds:
      - task: cargo-binstall
        vars:
          PACKAGES: lisensor mdbook@0.4 mdbook-admonish shwoop

  check:
    - task: check-non-dkp
    - task: check-dkp
  check-non-dkp:
    - lisensor
    - task: toolchain-build:check
    - task: cli-build:check
    - task: docker-build:check
    - task: cli:check
    - task: lib:check-rs
  check-dkp:
    - task: lib:configure
    - task: lib:check-c

  build:
    - task: build-non-dkp
    - task: build-dkp
  build-non-dkp:
    - task: cli:build
    - task: docs:build
    - task: lib:build-rs
  build-dkp:
    - task: lib:configure
    - task: lib:build-c

