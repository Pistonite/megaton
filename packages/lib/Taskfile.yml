version: '3'

includes:
  ccpp:
    taskfile: ../../mono-dev/task/ccpp.yaml
    internal: true
    optional: true

tasks:
  configure:
    desc: (Re)-configure ninja build and generate compile_commands.json
    cmds:
      - cmake -G Ninja -B build -S .

  build:
    desc: Execute incremental build
    cmds:
      - ninja -C build

  clean:
    desc: Clean build directory
    cmds:
      - rm -rf build

  check:
    cmds:
      - task: ccpp:fmt-check
        vars:
          SOURCE: src/megaton src/nximpl
      - task: ccpp:clang-tidy
        vars:
          SOURCE: src/megaton src/nximpl
          BUILD: build
          HEADER: ^include/
          ADD_CHECKS: >
            -bugprone-easily-swappable-parameters
  fix:
    cmds:
      - task: ccpp:fmt-fix
        vars:
          SOURCE: src/megaton src/nximpl
