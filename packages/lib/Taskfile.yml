version: '3'

includes:
  ccpp:
    taskfile: ../../mono-dev/task/ccpp.yaml
    internal: true
    optional: true
  cargo:
    taskfile: ../../mono-dev/task/cargo.yaml
    internal: true
    optional: true

tasks:
  configure:
    desc: (Re)-configure ninja build and generate compile_commands.json
    cmds:
      - cmake -G Ninja -B build -S .

  build-c:
    cmds:
      - ninja -C build

  build-rs:
    cmds:
      - cargo build

  clean:
    desc: Clean build directory
    cmds:
      - rm -rf build target

  check:
    - task: check-rs
    - task: check-c

  check-c:
    cmds:
      - task: ccpp:fmt-check
        vars:
          SOURCE: src/megaton src/nximpl
      - task: ccpp:clang-tidy
        vars:
          SOURCE: src/megaton src/nximpl
          BUILD: build
          HEADER: ^include/
          ADD_CHECKS: >
            -bugprone-easily-swappable-parameters

  check-rs:
    cmds:
      - task: cargo:clippy-all
      - task: cargo:fmt-check
  fix:
    cmds:
      - task: ccpp:fmt-fix
        vars:
          SOURCE: src/megaton src/nximpl
      - task: cargo:fmt-fix


