version: '3'

includes:
  docker:
    taskfile: ../../mono-dev/task/docker.yaml
    internal: true
    optional: true
  cargo: 
    taskfile: ../../mono-dev/task/cargo.yaml
    internal: true
    optional: true

vars:
  DOCKER_IMAGE: ghcr.io/pistonite/megaton-build

tasks:
  check:
    - task: cargo:clippy-all
    - task: cargo:fmt-check
  fix:
    - task: cargo:fmt-fix
  build:
    - task: prep-dockerfile
    - task: clean
    - task: curl-rustup-init
    - task: copy-toolchain-build
    - task: copy-megaton-cmd
    - task: docker:build
    - docker run --rm {{.DOCKER_IMAGE}} sh /root/print-info.sh

  prep-dockerfile:
    vars:
      RUST_VERSION:
        sh: rustc -V | sed -E 's/rustc ([^ ]+) .*$/\1/'
    cmds:
      - cmd: >
          if ! grep {{.RUST_VERSION}} Dockerfile; then
            echo "Rust version in Dockerfile mismatch with current Rust version" && exit 2
          fi
        silent: true

  copy-toolchain-build:
    - rm -rf temp/toolchain-build
    - cp -R ../toolchain-build temp
    - cargo run --example prep_toolchain_build
    - cp ../../Cargo.lock temp/toolchain-build/Cargo.lock
    - cd temp/toolchain-build && cargo metadata

  copy-megaton-cmd:
    - rm -rf temp/megaton-cmd
    - cp -R ../cli temp && mv temp/cli temp/megaton-cmd
    - rm -f temp/megaton-cmd/*.tar.gz
    - cargo run --example prep_megaton_cmd
    - cp ../../Cargo.lock temp/megaton-cmd/Cargo.lock
    - cd temp/megaton-cmd && cargo metadata

  curl-rustup-init:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > temp/rustup-init.sh

  clean:
    - rm -rf temp/*
    - mkdir -p temp

  nuke:
    # this doesn't remove dangling images, which contain cache for building
    # the rust toolchain. When removed building will take very long!
    - task: docker:clean

  publish:
    vars:
      TAG_VERSION:
        sh: grep -E ^version ../cli/Cargo.toml | head -n1 | sed -E 's/^version\s*=\s"([^"]+)"$/v\1/'
      TAG_COMMIT:
        sh: echo "sha-$(git rev-parse --short=7 HEAD)"
    cmds:
      - docker tag {{.DOCKER_IMAGE}}:latest {{.DOCKER_IMAGE}}:{{.TAG_VERSION}}
      - docker tag {{.DOCKER_IMAGE}}:latest {{.DOCKER_IMAGE}}:{{.TAG_COMMIT}}
      - docker push {{.DOCKER_IMAGE}}:latest
      - docker push {{.DOCKER_IMAGE}}:{{.TAG_VERSION}}
      - docker push {{.DOCKER_IMAGE}}:{{.TAG_COMMIT}}
