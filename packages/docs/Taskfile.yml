version: '3'

includes:
  mdbook:
    taskfile: ../../mono-dev/task/mdbook.yaml
    optional: true
    internal: true

tasks:
  install:
    - task: mdbook:install-theme
      vars:
        MONO_DEV: ../../mono-dev
    - cp src/icon.svg theme/favicon.svg
    - cp src/icon.png theme/favicon.png

  dev:
    desc: Start mdbook in watch mode
    cmds:
      - rm -rf book
      - shwoop book -w src --host -- mdbook build

  build:
    desc: (Re-)build the book
    cmds:
      - rm -rf book
      - mdbook build
