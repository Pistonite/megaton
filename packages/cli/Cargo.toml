[package]
name = "megaton-cmd"
version = "0.1.2"
edition = "2024"
license = "MIT"
description = "The `megaton` CLI command"
repository = "https://github.com/Pistonite/megaton"
publish = false

[dependencies.cu]
workspace = true
features = ["cli", "process", "prompt", "toml", "json", "fs", "coroutine-heavy", "derive"]

[dependencies]
serde.workspace = true
tokio.workspace = true
flate2.workspace = true
tar.workspace = true
walkdir.workspace = true
fxhash.workspace = true
depfile.workspace = true
regex.workspace = true
cargo_metadata.workspace = true
semver.workspace = true
semver.features = ["serde"]

megaton-toolchain-build.path = "../toolchain-build"

[build-dependencies]
cu = { workspace = true, features = ["fs", "toml"] }
megaton-cli-build.path = "../cli-build"

[[bin]]
name = "megaton"
path = "src/main.rs"

[package.metadata.binstall.signing]
algorithm = "minisign"
pubkey = "RWThJQKJaXayoZBe0YV5LV4KFkQwcqQ6Fg9dJBz18JnpHGdf/cHUyKs+"
