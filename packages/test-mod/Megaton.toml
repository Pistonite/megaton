[module]
name = "test-mod"
title-id = 0x01007ef00011e000

[megaton]
version = "0.1.0"

[build]
sources = [
    "src",
]

includes = [
    "src", 
    "include",
]

libpaths = [] # -L
libraries = [] # -l
ldscripts = []
objects = []

[build.flags] # https://megaton.pistonite.dev/config/build_flags.html
c = [
    "<default>",
    "-DNNSDK",
    "-DSWITCH",
    "-D__SWITCH__",
    "-DNN_SDK_MAJOR=4",
    "-DNN_SDK_MINOR=4",
    "-DNN_SDK_PATCH=0",
    "-DNN_WARE_MAJOR=4",
    "-DNN_WARE_MINOR=4",
    "-DNN_WARE_PATCH=0",
    "-DTest"
]

[check]
symbols = [
    "sdk.syms"
]
